{{- range $service := .Values.services }}
{{- $ctx := dict "root" $ "service" $service }}
{{- $probeMode := default "http" $service.probes.mode }}
{{- $envJson := trim (default "" $service.envJson) }}
{{- $envEntries := $service.env | default (list) }}
{{- $runtimeConfigFileName := trim (default "" $service.runtimeConfigFileName) }}
{{- $runtimeConfigFileContent := default "" $service.runtimeConfigFileContent }}
{{- $hasRuntimeConfig := and $runtimeConfigFileName (ne (trim $runtimeConfigFileContent) "") }}
{{- $dependencies := default (list) $service.dependsOn }}
{{- if $envJson }}
{{- $envEntries = fromJsonArray $envJson }}
{{- end }}
{{- $envChecksumSource := toJson $envEntries }}
{{- $envVars := list }}
{{- $secretEnvVars := list }}
{{- range $envEntry := $envEntries }}
  {{- if $envEntry.secret }}
    {{- $secretEnvVars = append $secretEnvVars (dict "name" (toString $envEntry.name) "value" (default "" $envEntry.value)) }}
  {{- else }}
    {{- $envVars = append $envVars (dict "name" (toString $envEntry.name) "value" (default "" $envEntry.value)) }}
  {{- end }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tenant-app.serviceName" $ctx }}
  namespace: {{ $.Values.workspace.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ include "tenant-app.syncWave" $ctx | quote }}
  labels:
    {{- include "tenant-app.labels" $ctx | nindent 4 }}
spec:
  replicas: {{ default $.Values.defaults.replicaCount $service.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "tenant-app.serviceName" $ctx }}
      app.kubernetes.io/instance: {{ $.Release.Name }}
  template:
    metadata:
      annotations:
        argocd.argoproj.io/sync-wave: {{ include "tenant-app.syncWave" $ctx | quote }}
        platform.devops/runtime-env-checksum: {{ sha256sum $envChecksumSource | quote }}
        {{- if $hasRuntimeConfig }}
        platform.devops/runtime-config-checksum: {{ sha256sum $runtimeConfigFileContent | quote }}
        {{- end }}
      labels:
        app.kubernetes.io/name: {{ include "tenant-app.serviceName" $ctx }}
        app.kubernetes.io/instance: {{ $.Release.Name }}
        platform.devops/workspace-id: {{ $.Values.workspace.id | quote }}
        platform.devops/user-id: {{ $.Values.workspace.userId | quote }}
        platform.devops/project-name: {{ $service.name | quote }}
        platform.devops/framework: {{ $service.framework | quote }}
        platform.devops/service-type: {{ default "internal" $service.serviceType | quote }}
    spec:
      serviceAccountName: {{ include "tenant-app.serviceAccountName" $ctx }}
      {{- if $.Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml $.Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      {{- if $dependencies }}
      initContainers:
        {{- range $dependencyName := $dependencies }}
        {{- $dependencyPort := 80 }}
        {{- range $candidate := $.Values.services }}
          {{- if eq $candidate.name $dependencyName }}
            {{- $dependencyPort = (default $candidate.containerPort $candidate.servicePort) }}
          {{- end }}
        {{- end }}
        - name: {{ printf "wait-for-%s" $dependencyName | trunc 63 | trimSuffix "-" }}
          image: "busybox:1.36.1"
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              host="{{ include "tenant-app.serviceName" (dict "root" $ "service" (dict "name" $dependencyName)) }}.{{ $.Values.workspace.namespace }}.svc"
              port="{{ $dependencyPort }}"
              until nc -z "${host}" "${port}"; do
                echo "Waiting for ${host}:${port} ..."
                sleep 2
              done
        {{- end }}
      {{- end }}
      containers:
        - name: {{ include "tenant-app.serviceName" $ctx }}
          image: "{{ $service.image.repository }}:{{ $service.image.tag }}"
          imagePullPolicy: {{ default $.Values.defaults.image.pullPolicy $service.image.pullPolicy }}
          ports:
            - containerPort: {{ $service.containerPort }}
              name: http
          {{- if $envVars }}
          envFrom:
            - configMapRef:
                name: {{ include "tenant-app.runtimeEnvConfigMapName" $ctx }}
          {{- end }}
          {{- if or $secretEnvVars $hasRuntimeConfig }}
          env:
            {{- range $secretEnvVars }}
            - name: {{ .name | quote }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "tenant-app.runtimeSecretName" $ctx }}
                  key: {{ .name | quote }}
            {{- end }}
            {{- if $hasRuntimeConfig }}
            - name: SPRING_CONFIG_ADDITIONAL_LOCATION
              value: {{ printf "file:/opt/app/runtime-config/%s" $runtimeConfigFileName | quote }}
            {{- end }}
          {{- end }}
          {{- if $hasRuntimeConfig }}
          volumeMounts:
            - name: runtime-config
              mountPath: {{ printf "/opt/app/runtime-config/%s" $runtimeConfigFileName | quote }}
              subPath: {{ $runtimeConfigFileName | quote }}
              readOnly: true
          {{- end }}
          resources:
            {{- toYaml (default $.Values.defaults.resources $service.resources) | nindent 12 }}
          {{- if and $service.probes $service.probes.startup $service.probes.startup.enabled }}
          startupProbe:
            {{- if eq $probeMode "tcp" }}
            tcpSocket:
              port: http
            {{- else }}
            httpGet:
              path: {{ default "/" $service.probes.startup.path }}
              port: http
            {{- end }}
            initialDelaySeconds: {{ default 0 $service.probes.startup.initialDelaySeconds }}
            periodSeconds: {{ default 5 $service.probes.startup.periodSeconds }}
            failureThreshold: {{ default 24 $service.probes.startup.failureThreshold }}
          {{- end }}
          {{- if and $service.probes $service.probes.readiness $service.probes.readiness.enabled }}
          readinessProbe:
            {{- if eq $probeMode "tcp" }}
            tcpSocket:
              port: http
            {{- else }}
            httpGet:
              path: {{ default "/" $service.probes.readiness.path }}
              port: http
            {{- end }}
            initialDelaySeconds: {{ default 10 $service.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ default 10 $service.probes.readiness.periodSeconds }}
            failureThreshold: {{ default 3 $service.probes.readiness.failureThreshold }}
          {{- end }}
          {{- if and $service.probes $service.probes.liveness $service.probes.liveness.enabled }}
          livenessProbe:
            {{- if eq $probeMode "tcp" }}
            tcpSocket:
              port: http
            {{- else }}
            httpGet:
              path: {{ default "/" $service.probes.liveness.path }}
              port: http
            {{- end }}
            initialDelaySeconds: {{ default 30 $service.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ default 15 $service.probes.liveness.periodSeconds }}
            failureThreshold: {{ default 3 $service.probes.liveness.failureThreshold }}
          {{- end }}
      {{- with $.Values.defaults.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if $hasRuntimeConfig }}
      volumes:
        - name: runtime-config
          configMap:
            name: {{ include "tenant-app.runtimeConfigMapName" $ctx }}
      {{- end }}
      {{- with $.Values.defaults.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.defaults.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
{{- end }}
