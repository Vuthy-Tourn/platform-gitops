{{- range $service := .Values.services }}
{{- $ctx := dict "root" $ "service" $service }}
{{- if $service.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "tenant-app.serviceName" $ctx }}
  namespace: {{ $.Values.workspace.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ include "tenant-app.syncWave" $ctx | quote }}
    argocd.argoproj.io/ignore-healthcheck: "true"
    {{- with $service.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  labels:
    {{- include "tenant-app.labels" $ctx | nindent 4 }}
spec:
  ingressClassName: {{ $service.ingress.className }}
  {{- if $service.ingress.tls.enabled }}
  {{- $hostSlug := $service.host | lower | replace "." "-" | replace "*" "wildcard" | trunc 40 | trimSuffix "-" }}
  {{- $defaultTlsSecret := printf "%s-%s-tls" (include "tenant-app.serviceName" $ctx) $hostSlug }}
  tls:
    - hosts:
        - {{ $service.host | quote }}
      secretName: {{ default $defaultTlsSecret $service.ingress.tls.secretName | quote }}
  {{- end }}
  rules:
    - host: {{ $service.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "tenant-app.serviceName" $ctx }}
                port:
                  number: {{ $service.servicePort }}
---
{{- end }}
{{- end }}
