app:
  name: "api-gateway"
  userId: "sample-user"
  projectName: "api-gateway"
  namespace: "user-sample-user"
  framework: "springboot-gradle"
  serviceType: "gateway"
  containerPort: 8080
  servicePort: 80
  domain: "apps.example.com"
  host: "api-gateway-sample.apps.example.com"

image:
  repository: "registry.example.com/platform/sample-user/api-gateway"
  tag: "sample-user-1-abcdef123456"
  pullPolicy: "IfNotPresent"

replicaCount: 1

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  tls:
    enabled: true
    secretName: "api-gateway-tls"

imagePullSecrets:
  - name: "registry-secret"

serviceAccount:
  create: true
  name: ""
  annotations: {}

envJson: |
  [
    { "name": "SPRING_PROFILES_ACTIVE", "value": "prod" },
    { "name": "ORDER_SERVICE_URL", "value": "http://order-service.user-sample-user.svc.cluster.local" }
  ]

probes:
  mode: "tcp"
  startup:
    enabled: true
    initialDelaySeconds: 0
    periodSeconds: 5
    failureThreshold: 24
  readiness:
    enabled: true
    path: "/"
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 3
  liveness:
    enabled: true
    path: "/"
    initialDelaySeconds: 30
    periodSeconds: 15
    failureThreshold: 3

env: []
nodeSelector: {}
tolerations: []
affinity: {}
