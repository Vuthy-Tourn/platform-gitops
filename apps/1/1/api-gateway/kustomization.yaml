apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: user-1
resources:
  - serviceaccount.yaml
  - deployment.yaml
  - service.yaml
  - hpa.yaml
  - ingress.yaml
generatorOptions:
  disableNameSuffixHash: true
commonLabels:
  app.kubernetes.io/name: api-gateway
  app.kubernetes.io/managed-by: kustomize
  platform.devops/user-id: "1"
  platform.devops/project-name: "api-gateway"
  platform.devops/framework: "springboot-gradle"
  platform.devops/service-type: "gateway"
configMapGenerator:
  - name: api-gateway-env
    envs:
      - env.properties
images:
  - name: api-gateway-image
    newName: docker.io/vuthytourn/api-gateway
    newTag: 1-20-3f7ceb190661
