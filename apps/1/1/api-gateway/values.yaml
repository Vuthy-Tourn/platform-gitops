app:
  name: "api-gateway"
  userId: "1"
  projectName: "api-gateway"
  namespace: "user-1"
  framework: "springboot-gradle"
  serviceType: "gateway"
  containerPort: 8080
  servicePort: 80
  domain: "apps.example.com"
  host: "api-gateway-1.apps.example.com" # managed-by-jenkins-host

image:
  repository: "docker.io/vuthytourn/api-gateway"
  tag: "1-20-3f7ceb190661" # managed-by-jenkins-image-tag
  pullPolicy: "IfNotPresent"

replicaCount: 1

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  tls:
    enabled: true
    secretName: "api-gateway-tls"

imagePullSecrets:
  - name: "registry-secret"

envJson: |
  [{"name":"CONFIG_SERVER_URL","value":"http://config-server.user-test.svc.cluster.local:8888"}]

probes:
  mode: "tcp"
  startup:
    enabled: true
    initialDelaySeconds: 0
    periodSeconds: 5
    failureThreshold: 24
  readiness:
    enabled: true
    path: "/"
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 3
  liveness:
    enabled: true
    path: "/"
    initialDelaySeconds: 30
    periodSeconds: 15
    failureThreshold: 3
