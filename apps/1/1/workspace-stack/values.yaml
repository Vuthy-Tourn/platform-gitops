workspace:
  id: "1"
  userId: "1"
  namespace: "user-1"
  domain: "apps.example.com"

imagePullSecrets:
  - name: "registry-secret"

defaults:
  replicaCount: 1
  image:
    pullPolicy: "IfNotPresent"
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
  nodeSelector: {}
  tolerations: []
  affinity: {}

services:
  - name: "config-server"
    framework: "springboot-gradle"
    serviceType: "internal"
    syncWave: 0
    replicaCount: 1
    containerPort: 8089
    servicePort: 8089
    host: "config-server-1.apps.example.com"
    image:
      repository: "docker.io/vuthytourn/config-server"
      tag: "1-20-cb2f7c1e0196"
      pullPolicy: "IfNotPresent"
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
    probes:
      mode: "tcp"
      startup:
        enabled: true
        initialDelaySeconds: 0
        periodSeconds: 5
        failureThreshold: 24
      readiness:
        enabled: true
        path: "/"
        initialDelaySeconds: 10
        periodSeconds: 10
        failureThreshold: 3
      liveness:
        enabled: true
        path: "/"
        initialDelaySeconds: 30
        periodSeconds: 15
        failureThreshold: 3
    autoscaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 4
      targetCPUUtilizationPercentage: 70
    ingress:
      enabled: false
      className: "nginx"
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt-prod"
      tls:
        enabled: true
        secretName: ""
    serviceAccount:
      create: true
      name: ""
      annotations: {}
    env: []
    envJson: "[]"
  - name: "api-gateway"
    framework: "springboot-gradle"
    serviceType: "gateway"
    syncWave: 1
    replicaCount: 1
    containerPort: 9099
    servicePort: 9099
    host: "api-gateway-1.apps.example.com"
    image:
      repository: "docker.io/vuthytourn/api-gateway"
      tag: "1-20-3f7ceb190661"
      pullPolicy: "IfNotPresent"
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
    probes:
      mode: "tcp"
      startup:
        enabled: true
        initialDelaySeconds: 0
        periodSeconds: 5
        failureThreshold: 24
      readiness:
        enabled: true
        path: "/"
        initialDelaySeconds: 10
        periodSeconds: 10
        failureThreshold: 3
      liveness:
        enabled: true
        path: "/"
        initialDelaySeconds: 30
        periodSeconds: 15
        failureThreshold: 3
    autoscaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 4
      targetCPUUtilizationPercentage: 70
    ingress:
      enabled: true
      className: "nginx"
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt-prod"
      tls:
        enabled: true
        secretName: ""
    serviceAccount:
      create: true
      name: ""
      annotations: {}
    env: []
    envJson: "[{\"name\":\"CONFIG_SERVER_URL\",\"value\":\"http://config-server.user-1.svc.cluster.local:8089\"}]"
