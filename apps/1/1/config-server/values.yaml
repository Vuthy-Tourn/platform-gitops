app:
  name: "config-server"
  userId: "1"
  projectName: "config-server"
  namespace: "user-1"
  framework: "springboot-gradle"
  serviceType: "internal"
  containerPort: 8089
  servicePort: 80
  domain: "apps.example.com"
  host: "config-server-1.apps.example.com" # managed-by-jenkins-host

image:
  repository: "docker.io/vuthytourn/config-server"
  tag: "1-20-cb2f7c1e0196" # managed-by-jenkins-image-tag
  pullPolicy: "IfNotPresent"

replicaCount: 1

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

ingress:
  enabled: false
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  tls:
    enabled: true
    secretName: "config-server-tls"

imagePullSecrets:
  - name: "registry-secret"

envJson: |
  []

probes:
  mode: "tcp"
  startup:
    enabled: true
    initialDelaySeconds: 0
    periodSeconds: 5
    failureThreshold: 24
  readiness:
    enabled: true
    path: "/"
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 3
  liveness:
    enabled: true
    path: "/"
    initialDelaySeconds: 30
    periodSeconds: 15
    failureThreshold: 3
