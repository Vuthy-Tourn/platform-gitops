apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: "ns-vuthy-tourn-bba33c3e-caeac2ee-9d8e-4031-a6a8-9214e4"
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  labels:
    app.kubernetes.io/managed-by: argocd
    platform.devops/project-name: "_workspace"
spec:
  project: "default"
  destination:
    server: https://kubernetes.default.svc
    namespace: "ns-vuthy-tourn-bba33c3e"
  source:
    repoURL: "https://github.com/Vuthy-Tourn/platform-gitops"
    targetRevision: "main"
    path: "apps/ns-vuthy-tourn-bba33c3e/caeac2ee-9d8e-4031-a6a8-9214e4/_workspace"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  info:
    - name: templateRepo
      value: "https://github.com/Vuthy-Tourn/platform-infra-testing"
    - name: templateRevision
      value: "main"
    - name: templatePath
      value: "workspace-bootstrap"
